<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Airflow DAG Explorer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      mermaid.initialize({ startOnLoad: true, theme: "neutral", flowchart: { htmlLabels: true, curve: "basis" } });
    });
  </script>
</head>
<body>
  <header class="topbar">
    <div class="container">
      <a class="brand" href="{{ url_for('index') }}">🌀 Airflow DAG Explorer</a>
      <nav>
        <a href="{{ url_for('index') }}">DAGs</a>
        <a href="{{ url_for('system') }}">System map</a>
        <a href="{{ url_for('about') }}">About</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <small>
        Static analysis of <code>dags/**/*.py</code>. No Airflow runtime required.
        Run via <code>python main.py ui</code>.
      </small>
    </div>
  </footer>
</body>
</html>
